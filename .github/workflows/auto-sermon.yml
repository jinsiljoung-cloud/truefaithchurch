name: 바른믿음교회 설교 자동생성

on:
  schedule:
    # 매주 화요일 오후 5시 KST = 08:00 UTC → 수요 저녁 설교
    - cron: '0 8 * * 2'
    # 매주 토요일 오후 1시 KST = 04:00 UTC → 주일 아침 설교
    - cron: '0 4 * * 6'

  # 수동 실행 (테스트용)
  workflow_dispatch:
    inputs:
      sermon_type:
        description: '설교 타입 (wednesday / sunday)'
        required: false
        default: ''

jobs:
  generate-sermon:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1) 저장소 체크아웃
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      # 2) Python 설정
      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3) 의존성 설치
      - name: 패키지 설치
        run: |
          pip install google-genai google-cloud-texttospeech --quiet

      # 4) Google 키 파일 복원
      - name: Google TTS 키 파일 생성
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > barunmideum-church-a663de7588cf.json

      # 5) 설교 자동생성 실행
      - name: 설교 생성 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.sermon_type }}" ]; then
            python generate_sermon.py ${{ github.event.inputs.sermon_type }}
          else
            python generate_sermon.py
          fi

      # 6) 키 파일 정리 (보안)
      - name: 키 파일 삭제
        if: always()
        run: rm -f barunmideum-church-a663de7588cf.json
